version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: mysql_cerrajeria
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: cerrajeria_db
      MYSQL_USER: admin_erp
      MYSQL_PASSWORD: erppassword
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  db_data: