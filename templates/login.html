<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>ERP | Autenticación Segura</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-light d-flex align-items-center justify-content-center" style="height: 100vh;">

    <div class="card bg-secondary text-white shadow-lg border-warning" style="width: 25rem;">
        <div class="card-header bg-black text-warning text-center py-3">
            <h4 class="mb-0">🛡️ Acceso Restringido</h4>
            <small class="text-muted">Centro de Mando ERP</small>
        </div>
        <div class="card-body p-4">
            
            {% if error %}
            <div class="alert alert-danger text-center fw-bold" role="alert">
                {{ error }}
            </div>
            {% endif %}

            <form method="POST" action="/login">
                <div class="mb-3">
                    <label class="form-label fw-bold">Usuario de Red</label>
                    <input type="text" name="usuario" class="form-control bg-dark text-white border-secondary" required autofocus placeholder="Ej. admin">
                </div>
                <div class="mb-4">
                    <label class="form-label fw-bold">Clave Criptográfica</label>
                    <input type="password" name="password" class="form-control bg-dark text-white border-secondary" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn btn-warning w-100 fw-bold text-dark py-2">Ingresar al Sistema</button>
            </form>
        </div>
        <div class="card-footer bg-black text-center text-muted small">
            Monitoreo de red activo. Intentos registrados.
        </div>
    </div>

</body>
</html>
